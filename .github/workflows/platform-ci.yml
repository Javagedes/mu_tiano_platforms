name: "Platform CI"

on:
  workflow_dispatch:
  release:
    types:
      - published
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:

  # A job to produce the environment constants for this repository, so that the build job can
  # generate its matrix.
  vars:
    name: Get Repository Constants
    uses: ./.github/workflows/constants.yml

  # Builds the platform(s) in this repository as defined by the matrix.
  build:
    name: Build ${{ matrix.config.platform }} ${{ matrix.target }} ${{ matrix.tool-chain }} (${{ matrix.os }})

    needs: 
      - vars

    runs-on: ${{ matrix.os }}

    # If matrix.container is not defined, then `image` will be null and no container will be used.
    container:
      image: ${{ matrix.container || null }}
      options: --security-opt seccomp=unconfined

    strategy:
      # This setting prevents the cancellation of other jobs when one job fails.
      fail-fast: false

      matrix:
        target:
          - DEBUG
          - RELEASE
        tool-chain:
          - CLANGPDB
          - VS2022
          - GCC5
        os:
          - windows-latest
          - ubuntu-latest
        container:
          - ${{ needs.vars.outputs.container-image}}
          - ''
        config:
          - file: Platforms/QemuQ35Pkg/PlatformBuild.py
            platform: Q35
          - file: Platforms/QemuSbsaPkg/PlatformBuild.py
            platform: SBSA

        include:
          - os: ubuntu-latest
            container: ${{ needs.vars.outputs.container-image }}
          - os: windows-latest
            container: ''

        exclude:
          # # Exclude container builds on Windows
          # - os: windows-latest
          #   container: ${{ needs.vars.outputs.container-image }}
          # # Exclude non-container builds on Ubuntu
          # - os: ubuntu-latest
          #   container: ''
          # Exclude GCC5 builds on Windows
          - os: windows-latest
            tool-chain: GCC5
          # Exclude VS builds on Ubuntu
          - os: ubuntu-latest
            tool-chain: VS2022

    steps:
      # Checkout the repository to the runner or container
      - name: Checkout repository
        uses: actions/checkout@v6
      
      # $GITHUB_WORKSPACE is mu_tiano_platforms/mu_tiano_platforms, which results in paths
      # for certain drivers being too long and resulting in build failures.
      - name: Create short path alias
        id: short-path
        if: runner.os == 'Windows'
        shell: bash
        run: |
          subst S: "$(cygpath -w '${{ github.workspace }}')"
          echo "short-path=S:" >> $GITHUB_OUTPUT

      # Configure git for use in the container. Specifically needed for the FFA builds
      - name: Container Configuration
        if: ${{ matrix.container != null }}
        run: |
          git config --global --add safe.directory '*'
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

      # Set the version of Python to use when outside of a container. Otherwise just use what's
      # in the container.
      - name: Setup Python ${{ needs.vars.outputs.python-version }}
        if: ${{ matrix.container == null }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ needs.vars.outputs.python-version }}
          cache: 'pip'
          cache-dependency-path: 'pip-requirements.txt'

      # Install the pip dependencies needed to run stuart for the platform(s)
      - name: Install dependencies
        run: pip install -r pip-requirements.txt

      # Run the build-platform action, which calls stuart_setup, stuart_update, and stuart_build
      - name: Prepare and Build ${{ matrix.config.platform }} ${{ matrix.target }} ${{ matrix.tool-chain}}
        id: build-platform
        uses: ./.github/actions/build-platform
        with:
          command: 'build'
          platform-config: ${{ matrix.config.file }}
          platform-name: ${{ matrix.config.platform }}
          target: ${{ matrix.target }}
          tool-chain: ${{ matrix.tool-chain }}
          stuart-args: 'HAF_TFA_BUILD=TRUE SHUTDOWN_AFTER_RUN=TRUE FILE_REGEX=*TestApp*.efi RUN_TESTS=TRUE QEMU_HEADLESS=TRUE BLD_*_QEMU_CORE_NUM=${{ needs.vars.outputs.qemu-core-count }}'
          working-directory: ${{ steps.short-path.outputs.short-path || github.workspace }}

      - name: Run ${{ matrix.config.platform }} ${{ matrix.target }} ${{ matrix.tool-chain}}
        uses: ./.github/actions/build-platform
        with:
          command: 'flash'
          platform-config: ${{ matrix.config.file }}
          platform-name: ${{ matrix.config.platform }}
          target: ${{ matrix.target }}
          tool-chain: ${{ matrix.tool-chain }}
          stuart-args: 'HAF_TFA_BUILD=TRUE SHUTDOWN_AFTER_RUN=TRUE FILE_REGEX=*TestApp*.efi RUN_TESTS=TRUE QEMU_HEADLESS=TRUE BLD_*_QEMU_CORE_NUM=${{ needs.vars.outputs.qemu-core-count }}'
          working-directory: ${{ steps.short-path.outputs.short-path || github.workspace }}

      - name: Publish Logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: build-logs-${{ matrix.config.platform }}-${{ matrix.target }}-${{ matrix.tool-chain }}-${{ matrix.os}}
          path: ${{ steps.build-platform.outputs.log-path }}

      - name: Publish Q35 release binaries
        if: ${{ github.event_name == 'release' && matrix.config.platform == 'Q35' && matrix.os == 'windows-latest' }}
        uses: actions/upload-artifact@v7
        with:
          name: release-bin-${{ matrix.config.platform }}-${{ matrix.target }}-${{ matrix.tool-chain }}
          path: |
            Build/**/FV/QEMUQ35_CODE.fd
            Build/**/FV/QEMUQ35_VARS.fd
          if-no-files-found: error

      - name: Publish SBSA release binaries
        if: ${{ github.event_name == 'release' && matrix.config.platform == 'SBSA'}}
        uses: actions/upload-artifact@v7
        with:
          name: release-bin-${{ matrix.config.platform }}-${{ matrix.target }}-${{ matrix.tool-chain }}
          path: |
            Build/**/FV/QEMU_EFI.fd
            Build/**/FV/SECURE_FLASH0.fd
          if-no-files-found: error
